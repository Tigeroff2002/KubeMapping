apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: logistic
data:
  server.properties: |
    # Server Basics
    broker.id=${BROKER_ID}
    cluster.id=4L6g3nShT-eMCtK--X86sw
    
    # Listeners
    listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    advertised.listeners=PLAINTEXT://kafka-${BROKER_ID}.kafka-headless.kafka.svc.cluster.local:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    controller.listener.names=CONTROLLER
    
    # Controller Settings
    process.roles=broker,controller
    controller.quorum.voters=1@kafka-0.kafka-headless.kafka.svc.cluster.local:9093
    
    # Topic Settings
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    
    # Log Settings
    log.dirs=/var/lib/kafka/data
    num.partitions=1
    default.replication.factor=1
    min.insync.replicas=1