# kafka-statefulset-with-pvc.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: logistic
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.3.2
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper.logistic.svc.cluster.local:2181"
        
        # ЯВНО отключаем KRaft и включаем ZooKeeper режим
        - name: KAFKA_ENABLE_KRAFT
          value: "false"
        - name: KAFKA_PROCESS_ROLES
          value: "broker"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: ""
        
        # Слушатели
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka.logistic.svc.cluster.local:9092"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        
        # Остальные настройки
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"
        
        # Для совместимости с версией 7.4.0
        - name: KAFKA_NODE_ID
          value: "1"
        - name: CLUSTER_ID
          value: "MwM3SWZ4RGt5em5qelpYSmhabUZz"
        
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60
          periodSeconds: 20
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 90
          periodSeconds: 30
  # ДОБАВЬТЕ ЭТУ СЕКЦИЮ - для автоматического создания PVC
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi