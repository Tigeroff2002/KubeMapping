apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: logistic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts-jdk17
        ports:
        - containerPort: 8080
        - containerPort: 50000
        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false"
        securityContext:
          runAsUser: 0
          privileged: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: jenkins-data
          mountPath: /var/jenkins_home
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: docker-credentials
          mountPath: /var/run/secrets/docker-hub
          readOnly: true
        - name: github-credentials
          mountPath: /var/run/secrets/github
          readOnly: true
        command: ["/bin/sh"]
        args: 
        - -c
        - |
          apt-get update && \
          apt-get install -y docker.io curl && \
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && \
          chmod +x kubectl && \
          mv kubectl /usr/local/bin/ && \
          usermod -aG docker jenkins && \
          /usr/local/bin/jenkins.sh
      volumes:
      - name: jenkins-data
        persistentVolumeClaim:
          claimName: jenkins-pvc
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
      - name: docker-credentials
        secret:
          secretName: docker-hub-credentials
      - name: github-credentials
        secret:
          secretName: github-credentials